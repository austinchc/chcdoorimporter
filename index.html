/* ═══ Transform hardware raw → import format ═══ */
function txHdw(raw){

      <div style={{background:"#fff",border:"1px solid #c8e0c8",borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,.1)",width:"100%",maxWidth:780,maxHeight:"90vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"20px 28px",borderBottom:"1px solid #c8e0c8",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16}}>
          <div><div style={{fontSize:15,fontWeight:700,color:"#1e2e1e",marginBottom:4}}>{props.title||"Column Mapping"}</div><div style={{fontSize:11,color:"#5a9e5a"}}>{loc.length} columns.{lc>0?<span style={{color:"#92400e"}}> {lc} flagged.</span>:null}</div></div>
          <button style={bS("g")} onClick={props.onBack}>← Back</button>
        </div>
        <div style={{overflowY:"auto",padding:"12px 28px 16px",flex:1}}>
          {loc.map(function(m,i){return(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 20px 1fr 70px 32px",gap:10,alignItems:"center",marginBottom:7,borderRadius:6,padding:"3px 0",background:!m.confident?"rgba(255,248,225,.2)":"transparent"}}>
              <div style={{background:"#f0f7f0",border:"1px solid #c8e0c8",borderRadius:6,padding:"7px 10px",fontSize:11,color:"#1e5c1e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.pdfColumn}</div>
              <div style={{textAlign:"center",color:"#3a7a3a",fontSize:14}}>→</div>
              <select value={m.importKey} onChange={function(e){uK(i,e.target.value);}} style={Object.assign({},S.inp,{cursor:"pointer"})}>{ak.map(function(k){return <option key={k} value={k}>{k}{props.keyLbl[k]?" — "+props.keyLbl[k]:""}</option>;})}</select>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",textAlign:"center",color:m.confident?"#1a5c1a":"#b45309"}}>{m.confident?"✓":"⚠"}</div>
              <button onClick={function(){dl(i);}} style={{background:"#fef3c7",border:"1px solid rgba(127,29,29,.25)",borderRadius:6,color:"#b45309",cursor:"pointer",fontSize:15,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          );})}
          <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(200,224,200,.3)"}}>
            <div style={{fontSize:10,color:"#5a9e5a",marginBottom:8}}>Add column:</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 20px 1fr auto",gap:10,alignItems:"center"}}>
              <input style={S.inp} placeholder="PDF column" value={cp} onChange={function(e){sCP(e.target.value);}}/>
              <div style={{textAlign:"center",color:"#6a9a6a"}}>→</div>
              <input style={S.inp} placeholder="Import key" value={ck} onChange={function(e){sCK(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")aC();}}/>
              <button style={bS("g")} onClick={aC}>+</button>
            </div>
          </div>
        </div>
        <div style={{padding:"16px 28px",borderTop:"1px solid #c8e0c8",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,color:"#6a9a6a"}}>{loc.length} cols · {props.rawRows.length} rows</div>
          <button style={bS("ok")} onClick={go}>Confirm →</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ DOOR TAB ═══ */
function DoorTab(){
  var _st=useState("up"),st=_st[0],sSt=_st[1];
  var _fi=useState(null),fi=_fi[0],sFi=_fi[1];
  var _rr=useState(null),rr=_rr[0],sRR=_rr[1];
  var _er=useState([]),er=_er[0],sER=_er[1];
  var _e=useState(""),err=_e[0],sE=_e[1];
  var _p=useState(""),pg=_p[0],sP=_p[1];
  var _ah=useState(DH.slice()),ah=_ah[0],sAH=_ah[1];
  async function go(){if(!fi)return;sSt("busy");sE("");sP("Reading…");try{var b=await f2b64(fi);var r=await exDoor(b,sP);sRR(r);sSt("map");}catch(e){sE(e.message);sSt("up");}sP("");}
  function onMap(kr,mk){var fr=txDoor(kr);var h=DH.filter(function(hh){return DOPT.indexOf(hh)===-1||mk.has(hh);});sAH(h);sER(fr);sSt("rev");}
  var info=(<div><span style={S.lbl}>Auto-transform rules</span><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8}}>{[["QUANTITY","Always 1"],["OPENING_SIZE","3'-0\" x 7'-0\" → 3070"],["OPENING_TYPE","Width > 4'-0\" → AI else SG"]].map(function(p){return <div key={p[0]} style={{background:"#f0f7f0",borderRadius:7,padding:"9px 12px",border:"1px solid #c8e0c8"}}><div style={{fontSize:9,fontWeight:700,color:"#2d7a2d",letterSpacing:1,marginBottom:3}}>{p[0]}</div><div style={{fontSize:10,color:"#3a6a3a"}}>{p[1]}</div></div>;})}</div></div>);
  if(st==="up"||st==="busy")return <Upload file={fi} setFile={sFi} onGo={go} busy={st==="busy"} prog={pg} err={err} info={info} label="Door Schedule"/>;
  if(st==="map"&&rr)return <MapPop mapping={rr.mapping||[]} rawRows={rr.rows||[]} impKeys={DIK} keyLbl={DKL} onOk={onMap} onBack={function(){sSt("up");}} title="Door Schedule — Mapping"/>;
  if(st==="rev")return <Grid rows={er} setRows={sER} hdrs={ah} setHdrs={sAH} hlbl={DHL} file={fi} title={rr?rr.scheduleType:"Door Schedule"} trunc={rr?rr._truncated:false} onNew={function(){sSt("up");sFi(null);sER([]);}} onMap={function(){sSt("map");}}/>;
  return null;
}

/* ═══ HARDWARE TAB ═══ */
function HdwTab(){
  var _st=useState("up"),st=_st[0],sSt=_st[1];
  var _fi=useState(null),fi=_fi[0],sFi=_fi[1];
  var _rr=useState(null),rr=_rr[0],sRR=_rr[1];
  var _er=useState([]),er=_er[0],sER=_er[1];
  var _e=useState(""),err=_e[0],sE=_e[1];
  var _p=useState(""),pg=_p[0],sP=_p[1];
  var _ah=useState(HH.slice()),ah=_ah[0],sAH=_ah[1];

  async function go(){
    if(!fi)return;sSt("busy");sE("");sP("Reading…");
    try{var b=await f2b64(fi);var r=await exHdw(b,sP);sRR(r);
      /* Hardware skips mapping — go straight to review */
      var final=txHdw(r);sAH(HH.slice());sER(final);sSt("rev");
    }catch(e){sE(e.message);sSt("up");}sP("");
  }

  var info=(<div><span style={S.lbl}>Import Format</span>
    <div style={{fontSize:11,color:"#3a6a3a",marginBottom:12,lineHeight:1.6}}>Extracts into the standard 6-column hardware import format:<br/><strong>Rec Type 1</strong> = Set header row (set #, SG/AI, size code)<br/><strong>Rec Type 2</strong> = Line item (qty, description, catalog #, finish, mfr code)</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>{[["IVE","Ives — Hinges"],["VON","Von Duprin — Panic, Mullions"],["SCH","Schlage — Locks, Cylinders"],["LCN","LCN — Closers"],["TRI","Trimco — Plates, Stops, Bolts"],["ZER","Zero — Gasketing, Sweeps"]].map(function(p){return <div key={p[0]} style={{background:"#f0f7f0",borderRadius:7,padding:"8px 12px",border:"1px solid #c8e0c8"}}><div style={{fontSize:10,fontWeight:700,color:"#2d7a2d",letterSpacing:1}}>{p[0]}</div><div style={{fontSize:10,color:"#3a6a3a"}}>{p[1]}</div></div>;})}</div>
  </div>);

  if(st==="up"||st==="busy")return <Upload file={fi} setFile={sFi} onGo={go} busy={st==="busy"} prog={pg} err={err} info={info} label="Hardware Schedule"/>;
  if(st==="rev")return <Grid rows={er} setRows={sER} hdrs={ah} setHdrs={sAH} hlbl={HHL} file={fi} title="Hardware Schedule" trunc={rr?rr._truncated:false} onNew={function(){sSt("up");sFi(null);sER([]);sRR(null);}}/>;
  return null;
}

  var _t=useState("door"),tab=_t[0],sTab=_t[1];
  return(
    <div style={S.app}>
      <div style={S.hdr}>
        <div style={{width:40,height:40,background:"#1a5c1a",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>CHC</div>
        <div style={{flex:1,minWidth:180}}>
          <div style={{fontSize:17,fontWeight:700,color:"#fff",letterSpacing:2,textTransform:"uppercase"}}>CHC Schedule Importer</div>

        </div>
      </div>
