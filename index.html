function fileToBase64(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function() { res(r.result.split(",")[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function downloadBlob(content, filename, mime) {
  var blob = new Blob([content], { type: mime });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

var XLSX_LIB = null;
function loadSheetJS() {
  return new Promise(function(resolve, reject) {
    if (XLSX_LIB) return resolve(XLSX_LIB);
    if (window.XLSX) { XLSX_LIB = window.XLSX; return resolve(XLSX_LIB); }
    var s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = function() { XLSX_LIB = window.XLSX; resolve(XLSX_LIB); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function doDownloadXLSX(rows, headers, filename) {
  var XL = await loadSheetJS();
  var wsData = [headers].concat(rows.map(function(r) { return headers.map(function(h) { return r[h] || ""; }); }));
  var ws = XL.utils.aoa_to_sheet(wsData);
  var wb = XL.utils.book_new();
  XL.utils.book_append_sheet(wb, ws, "IMPORT");
  XL.writeFile(wb, filename);
}

function toCSV(rows, headers) {
  var esc = function(v) { return '"' + String(v || "").replace(/"/g, '""') + '"'; };
  var lines = [headers.map(esc).join(",")];
  rows.forEach(function(r) { lines.push(headers.map(function(h) { return esc(r[h]); }).join(",")); });
  return lines.join("\n");
}

/* ═══════════ API ═══════════ */
function cleanJSON(raw) {
  var re = new RegExp("^" + TICKS + "json|^" + TICKS + "|" + TICKS + "$", "gm");
  return raw.replace(re, "").trim();
}

async function callClaude(b64, prompt, onProgress) {
  onProgress("Sending to AI…");
  var resp = await fetch(WORKER_URL, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:16000,
      messages:[{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
        {type:"text",text:prompt}
      ]}]
    })
  });
  var data = await resp.json();
  if(data.error) throw new Error(data.error.message);
  var raw = data.content.map(function(b){return b.text||"";}).join("").trim();
  var clean = cleanJSON(raw);
  try { return JSON.parse(clean); }
  catch(e) {
    var idx = clean.lastIndexOf("},");
    if(idx===-1) throw new Error("Could not parse response.");
    try { var p2 = JSON.parse(clean.slice(0,idx+1)+"]}"); p2._truncated=true; return p2; }
    catch(e2) { throw new Error("Response too large to parse."); }
  }
}

function extractDoor(b64, fn) {
  return callClaude(b64, 'Extract the DOOR SCHEDULE from this PDF.\nMap columns to: OPENING,OPENING_WIDTH,OPENING_HEIGHT,DOOR_ARCHITECT_TYPE,DOOR_DESC_RAW,FRAME_ARCHITECT_TYPE,FRAME_DESC_RAW,WALL_CONDITION,HEAD,SILL,HDW_SET,OPENING_NOTE,OPENING_LABEL\n(DOOR_DESC_RAW=door material, FRAME_DESC_RAW=frame material, WALL_CONDITION=jamb, OPENING_NOTE=comments)\nExtract ALL rows. Keep values exactly. Use "" for blanks. uncertain:true on unclear rows.\nReturn ONLY minified JSON:\n{"scheduleType":"Door Schedule","mapping":[{"pdfColumn":"NO.","importKey":"OPENING","confident":true}],"rows":[{"OPENING":"101"}]}', fn);
}

function extractHdw(b64, fn) {

          </div>
        </div>
        <div style={{overflowX:"auto",maxHeight:"65vh",overflowY:"auto",borderRadius:7,border:"1px solid #c8e0c8"}}>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
            <thead>
              <tr>
                <th style={Object.assign({},S.th,{width:30,textAlign:"center"})}>#</th>
                {activeHeaders.map(function(h){return (
                  <th key={h} style={S.th}>
                    {eH&&eH.key===h?(
                      <input autoFocus style={Object.assign({},S.cellInput,{color:"#1e2e1e",fontSize:10,background:"#f5f7f5",border:"1px solid #2d7a2d",borderRadius:4,padding:"2px 6px"})}
                        value={eH.value} onChange={function(e){setEH({key:h,value:e.target.value});}}
                        onBlur={function(){renH(h,eH.value);}} onKeyDown={function(e){if(e.key==="Enter")renH(h,eH.value);if(e.key==="Escape")setEH(null);}}/>
                    ):(
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{cursor:"text",flex:1}} onClick={function(){setEH({key:h,value:h});}}>{h}</span>
                        <button onClick={function(){delCol(h);}} style={{background:"none",border:"none",color:"rgba(229,83,51,.5)",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}}>×</button>
                      </div>
                    )}
                    {headerLabels[h]?<div style={S.thSub}>{headerLabels[h]}</div>:null}
                  </th>
                );})}
                <th style={Object.assign({},S.th,{width:36})}></th>
              </tr>
            </thead>
            <tbody>
              {dRows.map(function(row,ri){
                var ai=uOnly?editRows.indexOf(row):ri;
                return (
                  <tr key={ai} style={{background:ri%2?"#f5faf5":"transparent"}}>
                    <td style={Object.assign({},tdS(row.__uncertain),{textAlign:"center",color:row.__uncertain?"#b45309":"#9ab89a",fontSize:9})}>{row.__uncertain?"⚠":ai+1}</td>
                    {activeHeaders.map(function(h){return (
                      <td key={h} style={tdS(row.__uncertain)}>
                        <input style={Object.assign({},S.cellInput,{color:row.__uncertain?"#92400e":"#1e2e1e"})} value={row[h]||""} onChange={function(e){upCell(ai,h,e.target.value);}}/>
                      </td>
                    );})}
                    <td style={tdS(row.__uncertain)}>
                      <button onClick={function(){delRow(ai);}} style={{background:"none",border:"none",color:"#e55333",cursor:"pointer",fontSize:15,padding:"2px 6px"}}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:10,fontSize:10,color:"#6a9a6a"}}>💡 Click header to rename · × deletes column/row</div>
      </div>
    </div>
  );
}

/* ═══════════ DOOR TAB ═══════════ */
function DoorTab() {
  var _st=useState("upload"),stage=_st[0],setStage=_st[1];
  var _fi=useState(null),file=_fi[0],setFile=_fi[1];
  var _rr=useState(null),rawR=_rr[0],setRawR=_rr[1];
  var _er=useState([]),eRows=_er[0],setERows=_er[1];
  var _e=useState(""),err=_e[0],setErr=_e[1];
  var _p=useState(""),prog=_p[0],setProg=_p[1];
  var _ah=useState(DOOR_HDRS.slice()),aH=_ah[0],setAH=_ah[1];

  async function doExtract(){
    if(!file)return; setStage("extracting"); setErr(""); setProg("Reading…");
    try{ var b=await fileToBase64(file); var r=await extractDoor(b,setProg); setRawR(r); setStage("mapping"); }
    catch(e){ setErr(e.message); setStage("upload"); }
    setProg("");
  }
  function onMap(kr,mk){
    var fr=transformDoorRows(kr);
    var h=DOOR_HDRS.filter(function(hh){return DOOR_OPT.indexOf(hh)===-1||mk.has(hh);});
    setAH(h); setERows(fr); setStage("review");
  }

  var rules=(<div><span style={S.label}>Auto-transform rules</span><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8}}>{[["QUANTITY","Always 1"],["OPENING_SIZE","3'-0\" x 7'-0\" → 3070"],["OPENING_TYPE","Width > 4'-0\" → AI else SG"]].map(function(p){return <div key={p[0]} style={{background:"#f0f7f0",borderRadius:7,padding:"9px 12px",border:"1px solid #c8e0c8"}}><div style={{fontSize:9,fontWeight:700,color:"#2d7a2d",letterSpacing:1,marginBottom:3}}>{p[0]}</div><div style={{fontSize:10,color:"#3a6a3a"}}>{p[1]}</div></div>;})}</div></div>);

  if(stage==="upload"||stage==="extracting") return <UploadPanel file={file} setFile={setFile} onExtract={doExtract} extracting={stage==="extracting"} progress={prog} error={err} rulesInfo={rules} scheduleLabel="Door Schedule"/>;
  if(stage==="mapping"&&rawR) return <MappingPopup mapping={rawR.mapping||[]} rawRows={rawR.rows||[]} importKeys={DOOR_IMP_KEYS} keyLabels={DOOR_KEY_LBL} onConfirm={onMap} onBack={function(){setStage("upload");}} title="Door Schedule — Column Mapping"/>;
  if(stage==="review") return <ReviewGrid editRows={eRows} setEditRows={setERows} activeHeaders={aH} setActiveHeaders={setAH} headerLabels={DOOR_HDR_LBL} file={file} scheduleType={rawR?rawR.scheduleType:"Door Schedule"} truncated={rawR?rawR._truncated:false} onNewFile={function(){setStage("upload");setFile(null);setERows([]);}} onEditMapping={function(){setStage("mapping");}}/>;
  return null;
}

/* ═══════════ HARDWARE TAB ═══════════ */
function HdwTab() {
  var _st=useState("upload"),stage=_st[0],setStage=_st[1];
  var _fi=useState(null),file=_fi[0],setFile=_fi[1];
  var _rr=useState(null),rawR=_rr[0],setRawR=_rr[1];
  var _er=useState([]),eRows=_er[0],setERows=_er[1];
  var _e=useState(""),err=_e[0],setErr=_e[1];
  var _p=useState(""),prog=_p[0],setProg=_p[1];
  var _ah=useState(HDW_HDRS.slice()),aH=_ah[0],setAH=_ah[1];

  async function doExtract(){
    if(!file)return; setStage("extracting"); setErr(""); setProg("Reading…");
    try{ var b=await fileToBase64(file); var r=await extractHdw(b,setProg); setRawR(r); setStage("mapping"); }
    catch(e){ setErr(e.message); setStage("upload"); }
    setProg("");
  }
  function onMap(kr,mk){
    var fr=kr.map(function(row){
      var r={__uncertain:row.uncertain||false};
      HDW_HDRS.forEach(function(h){r[h]=String(row[h]||"").trim();});
      return r;
    });
    var h=HDW_HDRS.filter(function(hh){return mk.has(hh);});
    setAH(h.length>0?h:HDW_HDRS.slice());
    setERows(fr); setStage("review");
  }

  var rules=(<div><span style={S.label}>What gets extracted</span><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8}}>{[["HDW_SET","Set identifier (1, 293R.1, etc.)"],["Line Items","Each hinge, lock, closer = 1 row"],["MANUFACTURER","Schlage, LCN, Hager, etc."],["FINISH","US26D, 689, 626, etc."]].map(function(p){return <div key={p[0]} style={{background:"#f0f7f0",borderRadius:7,padding:"9px 12px",border:"1px solid #c8e0c8"}}><div style={{fontSize:9,fontWeight:700,color:"#2d7a2d",letterSpacing:1,marginBottom:3}}>{p[0]}</div><div style={{fontSize:10,color:"#3a6a3a"}}>{p[1]}</div></div>;})}</div></div>);

  if(stage==="upload"||stage==="extracting") return <UploadPanel file={file} setFile={setFile} onExtract={doExtract} extracting={stage==="extracting"} progress={prog} error={err} rulesInfo={rules} scheduleLabel="Hardware Schedule"/>;
  if(stage==="mapping"&&rawR) return <MappingPopup mapping={rawR.mapping||[]} rawRows={rawR.rows||[]} importKeys={HDW_IMP_KEYS} keyLabels={HDW_HDR_LBL} onConfirm={onMap} onBack={function(){setStage("upload");}} title="Hardware Schedule — Column Mapping"/>;
  if(stage==="review") return <ReviewGrid editRows={eRows} setEditRows={setERows} activeHeaders={aH} setActiveHeaders={setAH} headerLabels={HDW_HDR_LBL} file={file} scheduleType={rawR?rawR.scheduleType:"Hardware Schedule"} truncated={rawR?rawR._truncated:false} onNewFile={function(){setStage("upload");setFile(null);setERows([]);}} onEditMapping={function(){setStage("mapping");}}/>;
  return null;
}
